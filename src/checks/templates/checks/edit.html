{% extends "base.html" %}

{% block title %}Edit Check{% endblock %}

{% block content %}
<div class="max-w-lg">
  <h1 class="text-2xl font-semibold text-gray-900 mb-6">Edit Check</h1>

  {% if errors %}
  <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">
    {% for error in errors %}
    <p>{{ error }}</p>
    {% endfor %}
  </div>
  {% endif %}

  <form method="post" class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 space-y-4">
    {% csrf_token %}
    <div>
      <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
      <input type="text" name="name" id="name" value="{{ check.name }}" required
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
    </div>
    <div>
      <label for="url" class="block text-sm font-medium text-gray-700 mb-1">URL</label>
      <input type="url" name="url" id="url" value="{{ check.url }}" required
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
    </div>
    <div>
      <label for="timeout_seconds" class="block text-sm font-medium text-gray-700 mb-1">Timeout (seconds)</label>
      <input type="number" name="timeout_seconds" id="timeout_seconds" value="{{ check.timeout_seconds }}" min="1"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
    </div>
    <div>
      <label for="is_active" class="block text-sm font-medium text-gray-700 mb-1">Active</label>
      <select name="is_active" id="is_active"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        <option value="true" {% if check.is_active == "true" %}selected{% endif %}>Yes</option>
        <option value="false" {% if check.is_active == "false" %}selected{% endif %}>No</option>
      </select>
    </div>
    <div class="flex items-center gap-2">
      <input type="checkbox" name="is_public" id="is_public"
             {% if check.is_public == "true" %}checked{% endif %}
             class="h-4 w-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
      <label for="is_public" class="text-sm text-gray-700">Show on status page</label>
    </div>
    <div class="flex items-center gap-3 pt-2">
      <button type="submit"
              class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-4 py-2 rounded-lg text-sm">
        Save
      </button>
      <a href="{% url 'checks:list' %}" class="text-sm text-gray-600 hover:text-gray-800">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
